name: Benchmarks + Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run benchmarks
        run: cargo bench -p vexra-core -- --output-format bencher | tee bench-results.txt
      - name: Generate report
        run: |
          mkdir -p _site
          echo "<h1>Vexra Benchmarks</h1><pre>" > _site/index.html
          cat bench-results.txt >> _site/index.html
          echo "</pre>" >> _site/index.html
          cp -r target/criterion _site/ 2>/dev/null || true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: bench
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
