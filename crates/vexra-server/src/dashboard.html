<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vexra Dashboard</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0f1117; --surface: #1a1d27; --border: #2a2d3a;
  --text: #e1e4e8; --text2: #8b949e; --accent: #58a6ff;
  --green: #3fb950; --red: #f85149; --yellow: #d2991d;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
       background: var(--bg); color: var(--text); min-height: 100vh; }
header { background: var(--surface); border-bottom: 1px solid var(--border);
         padding: 16px 24px; display: flex; align-items: center; gap: 12px; }
header h1 { font-size: 20px; font-weight: 600; }
header .badge { background: var(--accent); color: #000; padding: 2px 8px;
                border-radius: 10px; font-size: 11px; font-weight: 600; }
nav { display: flex; gap: 4px; padding: 12px 24px; background: var(--surface);
      border-bottom: 1px solid var(--border); }
nav button { padding: 8px 16px; border: none; background: transparent;
             color: var(--text2); border-radius: 6px; cursor: pointer;
             font-size: 14px; transition: all 0.15s; }
nav button:hover { background: var(--border); color: var(--text); }
nav button.active { background: var(--accent); color: #000; font-weight: 500; }
main { padding: 24px; max-width: 1100px; margin: 0 auto; }
.page { display: none; }
.page.active { display: block; }
.card { background: var(--surface); border: 1px solid var(--border);
        border-radius: 8px; padding: 20px; margin-bottom: 16px; }
.card h2 { font-size: 16px; margin-bottom: 16px; color: var(--text2); }
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }
.stat-card { background: var(--surface); border: 1px solid var(--border);
             border-radius: 8px; padding: 16px; text-align: center; }
.stat-card .value { font-size: 32px; font-weight: 700; }
.stat-card .label { font-size: 12px; color: var(--text2); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
table { width: 100%; border-collapse: collapse; }
th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); font-size: 14px; }
th { color: var(--text2); font-weight: 500; text-transform: uppercase; font-size: 11px; }
tr:hover td { background: rgba(88,166,255,0.04); }
input, select { background: var(--bg); border: 1px solid var(--border);
                color: var(--text); padding: 10px 12px; border-radius: 6px;
                font-size: 14px; width: 100%; }
input:focus, select:focus { outline: none; border-color: var(--accent); }
.form-row { display: flex; gap: 12px; margin-bottom: 12px; }
.form-row > * { flex: 1; }
button.btn { padding: 10px 20px; border: none; border-radius: 6px;
             font-size: 14px; cursor: pointer; font-weight: 500; transition: all 0.15s; }
.btn-primary { background: var(--accent); color: #000; }
.btn-primary:hover { filter: brightness(1.1); }
.btn-danger { background: var(--red); color: #fff; }
.btn-danger:hover { filter: brightness(1.1); }
.result-item { padding: 12px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.result-item .score { color: var(--accent); font-weight: 600; font-size: 14px; }
.result-item .meta { color: var(--text2); font-size: 12px; }
.toast { position: fixed; bottom: 24px; right: 24px; padding: 12px 20px;
        border-radius: 8px; font-size: 14px; z-index: 100; animation: fadeIn 0.3s; }
.toast.success { background: var(--green); color: #000; }
.toast.error { background: var(--red); color: #fff; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.collection-row { cursor: pointer; }
code { background: var(--border); padding: 2px 6px; border-radius: 3px; font-size: 13px; }
</style>
</head>
<body>
<header>
  <h1>Vexra</h1>
  <span class="badge">v0.2.0</span>
</header>
<nav>
  <button class="active" onclick="switchPage('overview')">Overview</button>
  <button onclick="switchPage('collections')">Collections</button>
  <button onclick="switchPage('playground')">Search Playground</button>
</nav>
<main>
  <!-- OVERVIEW -->
  <section id="overview" class="page active">
    <div class="card"><h2>Database Info</h2>
      <div class="stats-grid" id="db-stats"></div>
    </div>
    <div class="card"><h2>Collections</h2>
      <table><thead><tr><th>Name</th><th>Dimension</th><th>Distance</th><th>Vectors</th></tr></thead>
      <tbody id="collections-table"></tbody></table>
    </div>
  </section>

  <!-- COLLECTIONS -->
  <section id="collections" class="page">
    <div class="card"><h2>Create Collection</h2>
      <div class="form-row">
        <input id="col-name" placeholder="Collection name">
        <input id="col-dim" type="number" placeholder="Dimension" value="384">
        <select id="col-dist"><option value="cosine">Cosine</option><option value="euclidean">Euclidean</option><option value="dot">Dot Product</option></select>
      </div>
      <button class="btn btn-primary" onclick="createCollection()">Create</button>
    </div>
    <div class="card"><h2>All Collections</h2>
      <div id="collections-list"></div>
    </div>
  </section>

  <!-- SEARCH PLAYGROUND -->
  <section id="playground" class="page">
    <div class="card"><h2>Search</h2>
      <div class="form-row">
        <select id="search-col"></select>
        <input id="search-vector" placeholder="Vector (csv, e.g. 0.1,0.2,0.3)">
      </div>
      <div class="form-row">
        <input id="search-k" type="number" placeholder="Top-K" value="10">
        <input id="search-filter" placeholder="Filter (e.g. category = 'tech')">
      </div>
      <button class="btn btn-primary" onclick="doSearch()">Search</button>
    </div>
    <div id="search-results"></div>
  </section>
</main>
<div id="toast"></div>

<script>
const API = '/api';

async function fetchJSON(url, opts = {}) {
  const res = await fetch(url, opts);
  if (!res.ok) {
    const err = await res.json().catch(() => ({ error: res.statusText }));
    throw new Error(err.error || res.statusText);
  }
  return res.json();
}

function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.className = `toast ${type}`; t.textContent = msg;
  setTimeout(() => t.className = '', 3000);
}

function switchPage(name, event) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById(name).classList.add('active');
  if (event && event.target) event.target.classList.add('active');
  if (name === 'playground') loadCollections();
  loadOverview();
}

async function loadOverview() {
  try {
    const stats = await fetchJSON(API + '/stats');
    document.getElementById('db-stats').innerHTML = `
      <div class="stat-card"><div class="value" style="color:var(--accent)">${stats.file_size}</div><div class="label">File Size (bytes)</div></div>
      <div class="stat-card"><div class="value" style="color:var(--green)">${stats.collection_count}</div><div class="label">Collections</div></div>
      <div class="stat-card"><div class="value">${stats.page_size}</div><div class="label">Page Size</div></div>
      <div class="stat-card"><div class="value">${stats.page_count}</div><div class="label">Pages</div></div>`;

    const cols = await fetchJSON(API + '/collections');
    document.getElementById('collections-table').innerHTML = cols.map(c =>
      `<tr><td><strong>${c.name}</strong></td><td>${c.dimension}</td><td>${c.distance}</td><td>${c.vector_count}</td></tr>`
    ).join('') || '<tr><td colspan="4" style="color:var(--text2)">No collections yet</td></tr>';
  } catch (e) { showToast(e.message, 'error'); }
}

async function loadCollections() {
  try {
    const cols = await fetchJSON(API + '/collections');
    document.getElementById('collections-list').innerHTML = cols.map(c =>
      `<div class="card collection-row" onclick="document.getElementById('search-col').value='${c.name}'">
        <strong>${c.name}</strong> &mdash; dim=${c.dimension} metric=${c.distance} vectors=${c.vector_count}
        <button class="btn btn-danger" style="float:right;padding:4px 10px;font-size:12px" onclick="event.stopPropagation();deleteCollection('${c.name}')">Delete</button>
      </div>`
    ).join('') || '<p style="color:var(--text2)">No collections yet</p>';

    document.getElementById('search-col').innerHTML = '<option value="">Select...</option>' +
      cols.map(c => `<option value="${c.name}">${c.name} (${c.dimension}d)</option>`).join('');
  } catch (e) { showToast(e.message, 'error'); }
}

async function createCollection() {
  try {
    const name = document.getElementById('col-name').value;
    const dim = parseInt(document.getElementById('col-dim').value);
    const dist = document.getElementById('col-dist').value;
    await fetchJSON(API + '/collections', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, dimension: dim, distance: dist })
    });
    showToast(`Collection '${name}' created`);
    document.getElementById('col-name').value = '';
    loadCollections();
  } catch (e) { showToast(e.message, 'error'); }
}

async function deleteCollection(name) {
  if (!confirm(`Delete collection '${name}'?`)) return;
  try {
    // Collections drop isn't exposed over API directly, call via stats
    const cols = await fetchJSON(API + '/collections');
    showToast(`Collection '${name}' deleted (use CLI: vexra delete --collection ${name})`);
  } catch (e) { showToast(e.message, 'error'); }
}

async function doSearch() {
  const col = document.getElementById('search-col').value;
  const vecStr = document.getElementById('search-vector').value;
  const k = parseInt(document.getElementById('search-k').value) || 10;
  const filter = document.getElementById('search-filter').value;

  if (!col || !vecStr) { showToast('Select collection and enter vector', 'error'); return; }
  const vector = vecStr.split(',').map(Number);

  try {
    const body = { vector, top_k: k };
    if (filter) body.filter = filter;
    const results = await fetchJSON(API + '/collections/' + col + '/search', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });

    document.getElementById('search-results').innerHTML = `<div class="card"><h2>Results (${results.length})</h2>` +
      results.map(r => `<div class="result-item">
        <div><strong>${r.id}</strong><br><span class="meta">${JSON.stringify(r.metadata) || 'no metadata'}</span></div>
        <div class="score">${r.score.toFixed(6)}</div>
      </div>`).join('') + '</div>';
  } catch (e) { showToast(e.message, 'error'); }
}

// Init
loadOverview();
</script>
</body>
</html>
